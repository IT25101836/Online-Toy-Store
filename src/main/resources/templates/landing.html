<!DOCTYPE html>
<html>
<head>
    <title>Welcome - Toy Store</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6600, #ff9900, #ffcc00);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .floating-toys {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .toy {
            position: absolute;
            font-size: 40px;
            animation: float 6s infinite ease-in-out;
            opacity: 0.3;
        }
        .toy:nth-child(1) { left: 5%; top: 10%; animation-delay: 0s; }
        .toy:nth-child(2) { left: 15%; top: 70%; animation-delay: 1s; }
        .toy:nth-child(3) { left: 80%; top: 15%; animation-delay: 2s; }
        .toy:nth-child(4) { left: 90%; top: 60%; animation-delay: 3s; }
        .toy:nth-child(5) { left: 50%; top: 80%; animation-delay: 4s; }
        .toy:nth-child(6) { left: 30%; top: 20%; animation-delay: 5s; }
        .toy:nth-child(7) { left: 70%; top: 40%; animation-delay: 2.5s; }
        .toy:nth-child(8) { left: 10%; top: 40%; animation-delay: 1.5s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .logo {
            font-size: 80px;
            animation: bounce 2s infinite;
            margin-bottom: 10px;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .store-name {
            font-size: 52px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            text-align: center;
            animation: fadeInDown 1s ease;
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tagline {
            font-size: 20px;
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            text-align: center;
            animation: fadeInUp 1s ease 0.3s both;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .features {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 15px 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .feature .icon { font-size: 30px; margin-bottom: 5px; }
        .feature p { font-size: 13px; font-weight: bold; }
        .buttons {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn-login {
            padding: 15px 50px;
            background-color: white;
            color: #ff6600;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            background-color: #fff3e0;
        }
        .btn-register {
            padding: 15px 50px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .btn-register:hover {
            transform: translateY(-3px);
            background-color: #444;
        }
        .stats {
            display: flex;
            gap: 30px;
            margin-top: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .stat { text-align: center; color: white; }
        .stat h3 {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .stat p { font-size: 14px; opacity: 0.9; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: white;
            opacity: 0.7;
            font-size: 13px;
        }
    </style>
</head>
<body>
<div class="floating-toys">
    <div class="toy">🧸</div>
    <div class="toy">🪀</div>
    <div class="toy">🎮</div>
    <div class="toy">🚗</div>
    <div class="toy">🎯</div>
    <div class="toy">🪁</div>
    <div class="toy">🎲</div>
    <div class="toy">🤖</div>
</div>
<div class="container">
    <div class="logo">🧸</div>
    <div class="store-name">Toy Store</div>
    <div class="tagline">
        ✨ The Best Toys for Your Little Ones! ✨
    </div>
    <div class="features">
        <div class="feature">
            <div class="icon">🚚</div>
            <p>Fast Delivery</p>
        </div>
        <div class="feature">
            <div class="icon">💯</div>
            <p>Quality Toys</p>
        </div>
        <div class="feature">
            <div class="icon">💳</div>
            <p>Secure Payment</p>
        </div>
        <div class="feature">
            <div class="icon">⭐</div>
            <p>Top Rated</p>
        </div>
    </div>
    <div class="buttons">
        <a href="/login" class="btn-login">Login</a>
        <a href="/register" class="btn-register">Register</a>
    </div>
    <div class="stats">
        <div class="stat">
            <h3>500+</h3>
            <p>Happy Customers</p>
        </div>
        <div class="stat">
            <h3>100+</h3>
            <p>Toys Available</p>
        </div>
        <div class="stat">
            <h3>50+</h3>
            <p>Brands</p>
        </div>
    </div>
</div>
<div class="footer">
    © 2026 Toy Store. All Rights Reserved.
</div>
</body>
</html>
