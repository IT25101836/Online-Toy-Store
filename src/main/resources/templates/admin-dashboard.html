<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Toy Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; margin: 0; }
        .navbar {
            background-color: #333;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: white; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .container { padding: 30px; }
        h2 { color: #333; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px 30px;
            text-align: center;
            min-width: 150px;
        }
        .stat-card h3 { color: #ff6600; font-size: 36px; margin: 0; }
        .stat-card p { color: #666; margin: 5px 0 0 0; }
        .section { margin-bottom: 40px; }
        .section h3 { color: #ff6600; border-bottom: 2px solid #ff6600; padding-bottom: 10px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        th {
            background-color: #333;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #f9f9f9; }
        .status-pending {
            background-color: #fff3cd;
            color: #856404;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-delivered {
            background-color: #d4edda;
            color: #155724;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        select {
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }
        .btn-update {
            padding: 5px 10px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .admin-links {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .admin-link {
            padding: 12px 20px;
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
        }
        .admin-link:hover { background-color: #e65c00; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>Admin Panel - Toy Store</h1>
    <div>
        <a href="/admin">Dashboard</a>
        <a href="/admin/users">Users</a>
        <a href="/admin/add-toy">Add Toy</a>
        <a href="/toys">View Store</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="container">
    <h2>Admin Dashboard</h2>

    <div class="stats">
        <div class="stat-card">
            <h3 th:text="${totalUsers}"></h3>
            <p>Total Users</p>
        </div>
        <div class="stat-card">
            <h3 th:text="${totalToys}"></h3>
            <p>Total Toys</p>
        </div>
        <div class="stat-card">
            <h3 th:text="${totalOrders}"></h3>
            <p>Total Orders</p>
        </div>
    </div>

    <div class="admin-links">
        <a href="/admin/users" class="admin-link">Manage Users</a>
        <a href="/admin/add-toy" class="admin-link">Add New Toy</a>
        <a href="/toys" class="admin-link">Manage Toys</a>
    </div>

    <div class="section">
        <h3>All Orders</h3>
        <table>
            <tr>
                <th>Order ID</th>
                <th>User ID</th>
                <th>Toy Name</th>
                <th>Quantity</th>
                <th>Total</th>
                <th>Status</th>
                <th>Date</th>
                <th>Update</th>
            </tr>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderId}"></td>
                <td th:text="${order.userId}"></td>
                <td th:text="${order.toyName}"></td>
                <td th:text="${order.quantity}"></td>
                <td th:text="'Rs. ' + ${order.totalPrice}"></td>
                <td>
                        <span th:class="${order.status == 'Pending' ?
                              'status-pending' : 'status-delivered'}"
                              th:text="${order.status}"></span>
                </td>
                <td th:text="${order.date}"></td>
                <td>
                    <form action="/admin/update-order-status" method="post">
                        <input type="hidden" name="orderId"
                               th:value="${order.orderId}"/>
                        <select name="status">
                            <option value="Pending">Pending</option>
                            <option value="Processing">Processing</option>
                            <option value="Delivered">Delivered</option>
                            <option value="Cancelled">Cancelled</option>
                        </select>
                        <button type="submit" class="btn-update">Update</button>
                    </form>
                </td>
            </tr>
        </table>
    </div>
</div>
</body>
</html>
