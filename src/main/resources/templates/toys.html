<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Toys - Toy Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; margin: 0; }
        .navbar {
            background-color: #ff6600;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: white; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .navbar .dashboard-btn {
            background-color: #333;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .navbar .profile-btn {
            background-color: white;
            color: #ff6600;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .container { padding: 30px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input {
            padding: 10px; width: 300px;
            border: 1px solid #ddd; border-radius: 5px; font-size: 16px;
        }
        .search-bar button {
            padding: 10px 20px; background-color: #ff6600;
            color: white; border: none; border-radius: 5px;
            cursor: pointer; font-size: 16px;
        }
        .toys-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .toy-card {
            background: white; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 20px; text-align: center;
        }
        .toy-card img {
            width: 100%; height: 180px; object-fit: cover;
            border-radius: 8px; margin-bottom: 10px;
        }
        .toy-card h3 { color: #ff6600; margin-top: 0; }
        .price { font-size: 20px; font-weight: bold; color: #333; }
        .badge {
            background-color: #fff3e0; color: #ff6600;
            padding: 3px 10px; border-radius: 20px; font-size: 12px;
        }
        .btn-add {
            display: inline-block; margin: 5px 2px;
            padding: 8px 15px; background-color: #ff6600;
            color: white; border-radius: 5px;
            text-decoration: none; font-size: 14px;
        }
        .btn-delete {
            display: inline-block; margin: 5px 2px;
            padding: 8px 15px; background-color: #dc3545;
            color: white; border-radius: 5px;
            text-decoration: none; font-size: 14px;
        }
        .btn-review {
            display: inline-block; margin: 5px 2px;
            padding: 8px 15px; background-color: #ffc107;
            color: white; border-radius: 5px;
            text-decoration: none; font-size: 14px;
        }
        .admin-btn {
            margin-bottom: 20px; padding: 10px 20px;
            background-color: #28a745; color: white;
            border-radius: 5px; text-decoration: none; font-size: 16px;
        }
        .message { color: green; font-weight: bold; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>🧸 Toy Store</h1>
    <div>
        <a href="/toys">Toys</a>
        <a href="/cart">My Cart</a>
        <a href="/orders">My Orders</a>
        <a href="/reviews">Reviews</a>
        <a href="/payments">Payments</a>
        <a href="/home" class="dashboard-btn">Dashboard</a>
        <a href="/profile" class="profile-btn">👤 Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="container">
    <p class="message" th:if="${message}" th:text="${message}"></p>
    <a href="/admin/add-toy" class="admin-btn">+ Add New Toy</a>
    <br/><br/>
    <div class="search-bar">
        <form action="/toys" method="get" style="display:flex; gap:10px;">
            <input type="text" name="search"
                   placeholder="Search toys..."
                   th:value="${search}"/>
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="toys-grid">
        <div th:each="toy : ${toys}" class="toy-card">
            <img th:if="${toy.imageUrl != null and toy.imageUrl != ''}"
                 th:src="${toy.imageUrl}" alt="Toy"/>
            <h3 th:text="${toy.name}">Toy Name</h3>
            <span class="badge" th:text="${toy.category}">Category</span>
            <p th:text="${toy.description}">Description</p>
            <p>Stock: <strong th:text="${toy.stock}">0</strong></p>
            <div class="price" th:text="'Rs. ' + ${toy.price}">Rs. 0</div>
            <br/>
            <a th:href="@{/cart/add(toyId=${toy.toyId})}"
               class="btn-add">Add to Cart</a>
            <a th:href="@{/reviews/add(toyId=${toy.toyId})}"
               class="btn-review">Review</a>
            <a th:href="@{/admin/delete-toy(toyId=${toy.toyId})}"
               class="btn-delete">Delete</a>
        </div>
    </div>
    <p th:if="${toys.size() == 0}">No toys found!</p>
</div>
</body>
</html>
