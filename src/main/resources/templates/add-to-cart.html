<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add to Cart - Toy Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; margin: 0; }
        .navbar {
            background-color: #ff6600;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: white; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .navbar .dashboard-btn {
            background-color: #333;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .navbar .profile-btn {
            background-color: white;
            color: #ff6600;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .container {
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .form-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 500px;
            text-align: center;
        }
        .form-box img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .form-box .no-image {
            width: 200px;
            height: 200px;
            background-color: #fff3e0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            margin: 0 auto 15px auto;
        }
        h2 { color: #ff6600; }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #ff6600;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #e65c00; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #ff6600; }
    </style>
</head>
<body>
<div class="navbar">
    <h1>🧸 Toy Store</h1>
    <div>
        <a href="/toys">Toys</a>
        <a href="/cart">My Cart</a>
        <a href="/orders">My Orders</a>
        <a href="/reviews">Reviews</a>
        <a href="/payments">Payments</a>
        <a href="/home" class="dashboard-btn">Dashboard</a>
        <a href="/profile" class="profile-btn">👤 Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="container">
    <div class="form-box">
        <div th:if="${toy.imageUrl != null && !toy.imageUrl.isEmpty()}">
            <img th:src="${toy.imageUrl}" alt="Toy Image"/>
        </div>
        <div th:if="${toy.imageUrl == null || toy.imageUrl.isEmpty()}"
             class="no-image">🧸</div>
        <h2 th:text="${toy.name}"></h2>
        <p th:text="${toy.description}"></p>
        <div class="price" th:text="'Rs. ' + ${toy.price}"></div>
        <form action="/cart/add" method="post">
            <input type="hidden" name="toyId" th:value="${toy.toyId}"/>
            <input type="number" name="quantity"
                   placeholder="Quantity" min="1" required/>
            <button type="submit">Add to Cart</button>
        </form>
        <div class="back-link">
            <a href="/toys">Back to Toys</a>
        </div>
    </div>
</div>
</body>
</html>
