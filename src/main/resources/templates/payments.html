<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment History - Toy Store</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f8ff; margin: 0; }
        .navbar {
            background-color: #ff6600;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: white; margin: 0; }
        .navbar a { color: white; text-decoration: none; margin-left: 20px; }
        .navbar .dashboard-btn {
            background-color: #333;
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .navbar .profile-btn {
            background-color: white;
            color: #ff6600;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .container { padding: 30px; max-width: 1000px; margin: 0 auto; }
        h2 { color: #ff6600; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        th {
            background-color: #ff6600;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fff3e0; }
        .status-paid {
            background-color: #d4edda;
            color: #155724;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-refunded {
            background-color: #f8d7da;
            color: #721c24;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .empty-payments {
            text-align: center;
            color: #999;
            font-size: 18px;
            margin-top: 50px;
        }
    </style>
</head>
<body>
<div class="navbar">
    <h1>🧸 Toy Store</h1>
    <div>
        <a href="/toys">Toys</a>
        <a href="/cart">My Cart</a>
        <a href="/orders">My Orders</a>
        <a href="/reviews">Reviews</a>
        <a href="/payments">Payments</a>
        <a href="/home" class="dashboard-btn">Dashboard</a>
        <a href="/profile" class="profile-btn">👤 Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>
<div class="container">
    <h2>Payment History</h2>
    <div th:if="${#lists.isEmpty(payments)}" class="empty-payments">
        <p>No payments yet!</p>
    </div>
    <table th:if="${!#lists.isEmpty(payments)}">
        <tr>
            <th>Payment ID</th>
            <th>Order ID</th>
            <th>Amount</th>
            <th>Method</th>
            <th>Status</th>
            <th>Billing Name</th>
            <th>Date</th>
        </tr>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.paymentId}"></td>
            <td th:text="${payment.orderId}"></td>
            <td th:text="'Rs. ' + ${payment.amount}"></td>
            <td th:text="${payment.method}"></td>
            <td>
                    <span th:class="${payment.status == 'Paid' ?
                          'status-paid' : 'status-refunded'}"
                          th:text="${payment.status}"></span>
            </td>
            <td th:text="${payment.billingName}"></td>
            <td th:text="${payment.date}"></td>
        </tr>
    </table>
</div>
</body>
</html>
